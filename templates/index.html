<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MusicDownloader — 搜歌下歌</title>
  <style>
    /* ── reset & base ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f7fa; color: #1a1a2e; min-height: 100vh;
    }
    .container { max-width: 800px; margin: 0 auto; padding: 32px 16px; }

    /* ── header ─────────────────────────────────────────────────── */
    h1 { text-align: center; font-size: 28px; margin-bottom: 8px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }

    /* ── search bar ─────────────────────────────────────────────── */
    .search-box { display: flex; gap: 8px; margin-bottom: 24px; }
    .search-box input {
      flex: 1; padding: 12px 16px; border: 2px solid #d1d5db; border-radius: 8px;
      font-size: 16px; outline: none; transition: border-color .2s;
    }
    .search-box input:focus { border-color: #6366f1; }
    .search-box button {
      padding: 12px 28px; background: #6366f1; color: #fff; border: none;
      border-radius: 8px; font-size: 16px; cursor: pointer; transition: background .2s;
    }
    .search-box button:hover { background: #4f46e5; }
    .search-box button:disabled { opacity: .6; cursor: not-allowed; }

    /* ── status / error ─────────────────────────────────────────── */
    .status-bar { text-align: center; padding: 12px; color: #666; min-height: 44px; }
    .status-bar.error { color: #dc2626; }
    .status-bar.info { color: #2563eb; }

    /* ── result cards ───────────────────────────────────────────── */
    .results { display: flex; flex-direction: column; gap: 12px; }
    .card {
      display: flex; gap: 16px; background: #fff; border-radius: 12px;
      padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.08); align-items: center;
    }
    .card-thumb {
      width: 100px; height: 56px; border-radius: 6px; object-fit: cover;
      flex-shrink: 0; background: #e5e7eb;
    }
    .card-body { flex: 1; min-width: 0; }
    .card-title { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { font-size: 13px; color: #888; margin-top: 2px; }
    .card-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .card-actions button {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px;
      cursor: pointer; transition: background .2s; white-space: nowrap;
    }
    .btn-preview { background: #dbeafe; color: #1d4ed8; }
    .btn-preview:hover { background: #bfdbfe; }
    .btn-preview.active { background: #fef08a; color: #854d0e; }
    .btn-download { background: #dcfce7; color: #15803d; }
    .btn-download:hover { background: #bbf7d0; }
    .card-actions button:disabled { opacity: .5; cursor: not-allowed; }

    /* ── hidden inline audio player ────────────────────────────── */
    #hidden-player { display: none; }

    /* ── responsive ────────────────────────────────────────────── */
    @media (max-width: 560px) {
      .card { flex-wrap: wrap; }
      .card-body { width: 100%; }
      .card-actions { width: 100%; justify-content: flex-end; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 MusicDownloader</h1>
    <p class="subtitle">搜索 YouTube 音乐 — 试听 30 秒 / 下载完整 MP3</p>

    <!-- 搜索框 -->
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="输入歌名，如「稻香」" autofocus>
      <button id="searchBtn">搜索</button>
    </div>

    <!-- 状态 / 错误 -->
    <div id="status" class="status-bar">输入歌名开始搜索</div>

    <!-- 结果列表 -->
    <div id="results" class="results"></div>

    <!-- 隐藏的 <audio> 用于试听 -->
    <audio id="hidden-player" controls preload="none"></audio>
  </div>

  <script>
    // ── DOM refs ──────────────────────────────────────────────────
    const inputEl   = document.getElementById('searchInput');
    const btn       = document.getElementById('searchBtn');
    const statusEl  = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const audioEl   = document.getElementById('hidden-player');

    let currentPreviewUrl = '';   // 当前正在试听的 URL，用于防重复点击

    // ── helpers ───────────────────────────────────────────────────
    function fmtDuration(sec) {
      if (!sec || sec <= 0) return '未知';
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return `${m}:${String(s).padStart(2, '0')}`;
    }

    function setStatus(msg, type) {
      statusEl.textContent = msg;
      statusEl.className = 'status-bar' + (type ? ' ' + type : '');
    }

    // ── search ────────────────────────────────────────────────────
    async function doSearch(query) {
      btn.disabled = true;
      resultsEl.innerHTML = '';
      setStatus('搜索中…', 'info');

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
        const data = await res.json();

        if (!res.ok) {
          setStatus(data.error || '搜索请求失败', 'error');
          return;
        }

        if (!data.results || data.results.length === 0) {
          setStatus('未找到结果，请换个关键词试试', 'error');
          return;
        }

        setStatus(`找到 ${data.count} 条结果`, '');
        renderCards(data.results);
      } catch (err) {
        setStatus('网络错误，请检查后端是否运行', 'error');
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    // ── render cards ──────────────────────────────────────────────
    function renderCards(items) {
      resultsEl.innerHTML = items.map((item, idx) => {
        const dur = fmtDuration(item.duration);
        return `
          <div class="card" data-url="${item.url}">
            <img class="card-thumb" src="${item.thumbnail || ''}" alt="" loading="lazy"
                 onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2256%22><rect fill=%22%23e5e7eb%22 width=%22100%22 height=%2256%22/></svg>'">
            <div class="card-body">
              <div class="card-title" title="${escHtml(item.title)}">${escHtml(item.title)}</div>
              <div class="card-meta">${escHtml(item.author)} · ${dur}</div>
            </div>
            <div class="card-actions">
              <button class="btn-preview" data-url="${item.url}" data-idx="${idx}">试听</button>
              <button class="btn-download" data-url="${item.url}">下载</button>
            </div>
          </div>
        `;
      }).join('');

      // 绑定事件（事件委托在父级上更高效，但为了清晰这里用遍历）
      document.querySelectorAll('.btn-preview').forEach(el => {
        el.addEventListener('click', onPreviewClick);
      });
      document.querySelectorAll('.btn-download').forEach(el => {
        el.addEventListener('click', onDownloadClick);
      });
    }

    // ── simple escape ─────────────────────────────────────────────
    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // ── preview (试听) ────────────────────────────────────────────
    function onPreviewClick(e) {
      const btnEl = e.currentTarget;
      const url   = btnEl.dataset.url;
      if (!url) return;

      // 如果点击的是同一个正在播放的按钮 → 停止
      if (currentPreviewUrl === url && !audioEl.paused) {
        audioEl.pause();
        audioEl.currentTime = 0;
        currentPreviewUrl = '';
        btnEl.textContent = '试听';
        btnEl.classList.remove('active');
        return;
      }

      // 取消之前按钮的高亮
      document.querySelectorAll('.btn-preview.active').forEach(el => {
        el.textContent = '试听';
        el.classList.remove('active');
      });

      // 开始新试听
      const previewApiUrl = `/api/preview?url=${encodeURIComponent(url)}`;
      audioEl.src = previewApiUrl;
      audioEl.play().catch(() => {});

      currentPreviewUrl = url;
      btnEl.textContent = '停止';
      btnEl.classList.add('active');

      // 30 秒后自动停止
      const stopTimer = setTimeout(() => {
        if (currentPreviewUrl === url) {
          audioEl.pause();
          audioEl.currentTime = 0;
          currentPreviewUrl = '';
          btnEl.textContent = '试听';
          btnEl.classList.remove('active');
        }
      }, 30000);

      // 如果音频自然结束也重置按钮
      audioEl.onended = () => {
        if (currentPreviewUrl === url) {
          currentPreviewUrl = '';
          btnEl.textContent = '试听';
          btnEl.classList.remove('active');
        }
        clearTimeout(stopTimer);
      };
    }

    // ── download (下载) ───────────────────────────────────────────
    function onDownloadClick(e) {
      const url = e.currentTarget.dataset.url;
      if (!url) return;
      // 直接打开下载链接 → 浏览器弹出"另存为"对话框
      window.open(`/api/download?url=${encodeURIComponent(url)}`, '_blank');
    }

    // ── enter key ─────────────────────────────────────────────────
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doSearch(inputEl.value.trim());
    });
    btn.addEventListener('click', () => doSearch(inputEl.value.trim()));

    // ── auto-focus ────────────────────────────────────────────────
    inputEl.focus();
  </script>
</body>
</html>
